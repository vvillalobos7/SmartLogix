# -------------------------------------------------------
# Configuración para SonarCloud (nube)
# -------------------------------------------------------
# IMPORTANTE: Reemplaza los valores de sonar.organization y sonar.projectKey
# con los que aparecen en tu proyecto de SonarCloud.
# Los encontrarás en: SonarCloud > Tu Proyecto > Information (ícono ℹ️)
# -------------------------------------------------------
sonar.organization=vvillalobos7
sonar.projectKey=vvillalobos7_SmartLogix
sonar.projectName=SmartLogix - Frontend Angular
sonar.projectVersion=1.0

# URL del servidor (SonarCloud, no SonarQube local)
sonar.host.url=https://sonarcloud.io

# Rutas de código fuente y pruebas
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts
sonar.exclusions=node_modules/**,dist/**,src/**/*.spec.ts,src/**/*.test.ts,src/main.ts,src/main.server.ts,src/server.ts

# Codificación del código fuente
sonar.sourceEncoding=UTF-8

# Ruta del reporte de cobertura LCOV generado por Vitest
# Este archivo se genera al ejecutar: npm run test:coverage
sonar.javascript.lcov.reportPaths=coverage/SmartLogix/lcov.info
