<div class="space-y-4">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div>
      <h2 class="text-base font-semibold text-gray-800">Gestión de Roles</h2>
      <p class="text-xs text-gray-400">Roles y permisos del sistema</p>
    </div>
    <button (click)="openNew()"
      class="flex items-center gap-1.5 px-3 py-1.5 bg-green-700 hover:bg-green-800 text-white text-xs font-semibold rounded-lg transition-colors shadow-sm self-start">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nuevo Rol
    </button>
  </div>

  <!-- Tarjetas de roles -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    @for (rol of roles; track rol.id) {
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-5 py-4 bg-gradient-to-r from-green-700 to-green-800 text-white">
          <div class="flex items-start justify-between">
            <div>
              <p class="font-mono text-xs text-white/60 mb-1">{{ rol.id }}</p>
              <h3 class="text-base font-bold capitalize">{{ rol.nombre }}</h3>
            </div>
            <div class="flex gap-1">
              <button (click)="openEdit(rol)" class="p-1.5 bg-white/20 hover:bg-white/30 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button (click)="onDelete(rol.id)" class="p-1.5 bg-white/20 hover:bg-red-500 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="px-5 py-4">
          <p class="text-xs text-gray-500">{{ rol.descripcion ?? 'Sin descripción' }}</p>
        </div>
      </div>
    }
    @empty {
      <div class="col-span-4 bg-white rounded-xl shadow-sm border border-gray-100 px-4 py-8 text-center text-xs text-gray-400">
        Sin roles registrados.
      </div>
    }
  </div>

</div>

<!-- Modal -->
@if (showModal) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.45);backdrop-filter:blur(2px)">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <div>
          <h3 class="text-sm font-semibold text-gray-800">{{ editando ? 'Editar Rol' : 'Nuevo Rol' }}</h3>
          <p class="text-xs text-gray-400">Completa los datos del rol</p>
        </div>
        <button (click)="closeModal()" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Nombre *</label>
          <input formControlName="nombre" class="w-full px-3 py-2 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" placeholder="bodeguero">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Descripción</label>
          <textarea formControlName="descripcion" rows="2" class="w-full px-3 py-2 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50 resize-none"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" (click)="closeModal()" class="px-4 py-2 text-xs font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">Cancelar</button>
          <button type="submit" [disabled]="form.invalid" class="px-4 py-2 text-xs font-semibold text-white bg-green-700 hover:bg-green-800 disabled:opacity-60 rounded-lg">{{ editando ? 'Actualizar' : 'Crear' }}</button>
        </div>
      </form>
    </div>
  </div>
}
